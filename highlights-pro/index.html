<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football AI Dev Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">⚽ AI Analysis Studio</div>
        <p>Hybrid Dev Environment (YouTube + Local Analysis)</p>
    </header>

    <main class="container">
        <section class="video-section">
            <!-- Source Selector -->
            <div class="source-selector">
                <button id="mode-yt" class="tab-btn active">YouTube Mode (Legal)</button>
                <button id="mode-local" class="tab-btn">Local Dev Mode (AI Testing)</button>
            </div>

            <!-- YouTube Input -->
            <div id="yt-input-area" class="input-group">
                <input type="text" id="youtube-url" placeholder="Paste YouTube Link">
                <button id="load-yt-btn" class="primary-btn">Load YouTube</button>
            </div>

            <!-- Local File Input (Hidden by default) -->
            <div id="local-input-area" class="input-group" style="display: none;">
                <input type="file" id="local-file" accept="video/*">
                <p><small>Use local files to test real frame-by-frame AI analysis.</small></p>
            </div>
            
            <div class="video-container">
                <!-- YouTube Player -->
                <div id="player"></div>
                <!-- Local Video Player (HTML5) -->
                <video id="local-video" style="display: none;" controls></video>
                
                <!-- AI Overlay Canvas (This is where we draw tracking boxes) -->
                <canvas id="ai-canvas"></canvas>
            </div>
            
            <div class="controls-card">
                <div class="player-select">
                    <input type="text" id="target-player" placeholder="Player Name to Track">
                    <button id="scan-btn" class="secondary-btn">🔍 Run AI Tracking</button>
                </div>
            </div>
        </section>

        <aside class="analysis-panel">
            <h2>Tracking Results</h2>
            <div id="analysis-status" class="status-box">Select a source to begin.</div>
            <div id="highlight-list" class="highlight-list"></div>
        </aside>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
